trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: BackendTests
  displayName: 'Backend Tests'
  jobs:
  - job: Pytest
    displayName: 'Run Pytest'

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medical_db
        ports:
          - 5432:5432

    variables:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/medical_db

    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: |
        echo "Esperando a que PostgreSQL esté listo..."
        for i in {1..30}; do
          if python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 5432)); s.close()"; then
            echo "PostgreSQL disponible."
            break
          fi
          echo "Intento $i/30..."
          sleep 2
        done

        echo "Ubicación actual:"
        pwd

        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

        export PYTHONPATH=$(pwd)
        export DATABASE_URL="$(DATABASE_URL)"

        pytest backend/app/tests -v
      displayName: 'Run Backend Tests'

- stage: FrontendTests
  displayName: 'Frontend Tests'
  dependsOn: BackendTests
  condition: succeeded()

  jobs:

  - job: Vitest
    displayName: 'Run Vitest'

    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'

    - script: |
        cd frontend/medical-frontend

        npm install

        npm test -- --run
      displayName: 'Run Frontend Tests'