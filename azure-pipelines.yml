trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: BackendTests
  displayName: 'Backend Tests'
  jobs:
  - job: Pytest
    displayName: 'Run Pytest + Coverage'

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medical_db
        ports:
          - 5432:5432

    variables:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/medical_db

    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: |
        echo "Esperando a que PostgreSQL esté listo..."
        for i in {1..30}; do
          if python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 5432)); s.close()"; then
            echo "PostgreSQL disponible."
            break
          fi
          echo "Intento $i/30..."
          sleep 2
        done

        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

        export PYTHONPATH=$(pwd)
        export DATABASE_URL="$(DATABASE_URL)"

        pytest backend/app/tests -v \
          --cov=backend/app \
          --cov-report=xml \
          --cov-report=term-missing \
          --junitxml=test-results-backend.xml
      displayName: 'Run Backend Tests with Coverage'

    - task: PublishTestResults@2
      displayName: 'Publish Backend Test Results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results-backend.xml'
        testRunTitle: 'Backend Pytest'
        mergeTestResults: true
        failTaskOnFailedTests: true

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish Backend Code Coverage'
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
        pathToSources: '$(System.DefaultWorkingDirectory)/backend/app'
        failIfCoverageEmpty: true

- stage: FrontendTests
  displayName: 'Frontend Tests'
  dependsOn: BackendTests
  condition: succeeded()

  jobs:

  - job: Vitest
    displayName: 'Run Vitest + Coverage'

    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'

    - script: |
        cd frontend/medical-frontend

        npm install
        npm run test:coverage
      displayName: 'Run Frontend Tests with Coverage'

    - task: PublishTestResults@2
      displayName: 'Publish Frontend Test Results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'frontend/medical-frontend/test-results-frontend.xml'
        testRunTitle: 'Frontend Vitest'
        mergeTestResults: true
        failTaskOnFailedTests: true

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish Frontend Code Coverage'
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/frontend/medical-frontend/coverage/cobertura-coverage.xml'
        pathToSources: '$(System.DefaultWorkingDirectory)/frontend/medical-frontend/src'
        failIfCoverageEmpty: true
